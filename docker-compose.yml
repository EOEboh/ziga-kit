version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zigakit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zigakit
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: zigakit
    ports:
      - "5432:5432"
    volumes:
      - zigakit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zigakit -d zigakit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  zigakit_pgdata: